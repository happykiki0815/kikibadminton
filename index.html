<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基基羽毛球隊 Kikibadminton</title>
    <style>
        /* 網頁基本設定 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        /* 頁首橫幅 */
        header {
            background-color: #1a508b;
            color: white;
            padding: 40px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* 主內容區 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1a508b;
            border-bottom: 2px solid #e1e8f0;
            padding-bottom: 10px;
        }

        /* 測試修改目標區 */
        .test-zone {
            background-color: #e8f4fd;
            border-left: 5px solid #2b92e4;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 按鈕樣式 */
        .btn {
            display: inline-block;
            background-color: #ff6b6b;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #ff5252;
        }

        /* 頁尾 */
        footer {
            margin-top: 5px;
            padding: 20px
            }
